name: Build And Release Memoir

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Swift Test
        run: swift test

  package:
    name: Package App
    runs-on: macos-15
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Make packaging scripts executable
        run: chmod +x scripts/build-app.sh scripts/package-release.sh

      - name: Build app bundle
        run: ./scripts/build-app.sh

      - name: Determine archive name
        id: archive
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && -n "${GITHUB_REF_NAME:-}" ]]; then
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "name=Memoir-macOS" >> "$GITHUB_OUTPUT"
          fi

      - name: Package zip
        run: ./scripts/package-release.sh "${{ steps.archive.outputs.name }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: memoir-macos-build
          path: |
            dist/Memoir.app
            dist/*.zip
          if-no-files-found: error

      - name: Upload zip to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: dist/*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
          make_latest: true
